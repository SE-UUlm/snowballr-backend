version: "3.7"
services:
  # Postgres sql database server only visible by pgadmin and backend services
  postgresdb:
    image: postgres
    expose:
      - "5432"
    volumes:
      - ${POSTGRES_PATH}:/var/lib/postgresql/
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    logging:
      driver: ${POSTGRES_LOGGING}
  # Webservice to administrate postgres db
  pgadmin:
    image: dpage/pgadmin4
    ports: 
      - "5555:80"
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_EMAIL}
      - PGADMIN_DEFAULT_PASSWORD=${POSTGRES_PASSWORD}
    depends_on:
      - postgresdb
    logging:
      driver: ${PGADMIN_LOGGING}
  # CouchDB database server only visible by backend
  couchdb:
    image: couchdb
    expose:
      - "5984"
    volumes:
      - ${COUCHDB_PATH}/data:/opt/couchdb/data
      - ${COUCHDB_PATH}/etc:/opt/couchdb/etc/local.d
    environment:
      - COUCHDB_USER=${COUCHDB_USER}
      - COUCHDB_PASSWORD=${COUCHDB_PASSWORD}
    logging:
      driver: ${COUCHDB_LOGGING}
  # Environment container for hosting backend deno typescript application
  backend:
    image: hayd/ubuntu-deno
    command: run --allow-net --allow-env --allow-read /app/main.ts
    ports:
      - "8000:8000"
    volumes:
      - ${BACKEND_PATH}:/app
    environment: 
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    depends_on:
      - postgresdb
      - couchdb
      - pgadmin