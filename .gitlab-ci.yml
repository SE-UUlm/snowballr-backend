stages:
  - build
  - test
  - deploy


build:
  stage: build
  image: docker:19.09.7
  services:
    - docker:19.09.7-dind
  variables:
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" $CI_REGISTRY
  script:
    - |
      if [[ "$CI_COMMIT_BRANCH" == "$CI_DEFAULT_BRANCH" ]]; then
        tag=""
        echo "Running on default branch '$CI_DEFAULT_BRANCH': tag = 'latest'"
      else
        tag=":$CI_COMMIT_REF_SLUG"
        echo "Running on branch '$CI_COMMIT_BRANCH': tag = $tag"
      fi
    - docker build --pull -t "$CI_REGISTRY_IMAGE${tag}" .
    - docker push "$CI_REGISTRY_IMAGE${tag}"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_BRANCH == "develop"


deploy-dev:
  stage: deploy
  image: ubuntu
  variables:
    DESTINATOIN_SSH_URL: ssh://ubuntu@$DESTINATION_HOST
  before_script:
    # Prepare ssh to destination host
    - 'which ssh-agent || ( apt-get update -y && apt-get install openssh-client -y )'
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add - > /dev/null
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan -t rsa $DESTINATION_HOST >> ~/.ssh/known_hosts
  script:
    - |
      if [[ "$CI_COMMIT_BRANCH" == "$CI_DEFAULT_BRANCH" ]]; then
        tag=""
        echo "Running on default branch '$CI_DEFAULT_BRANCH': tag = 'latest'"
      else
        tag=":$CI_COMMIT_REF_SLUG"
        echo "Running on branch '$CI_COMMIT_BRANCH': tag = $tag"
      fi
    - ssh $DESTINATOIN_SSH_URL "docker login -u gitlab-ci-token -p $CI_JOB_TOKEN $CI_REGISTRY"
    - ssh $DESTINATOIN_SSH_URL "docker pull $CI_REGISTRY_IMAGE${tag}"
    - ssh $DESTINATOIN_SSH_URL "docker stop backend-develop"
    - ssh $DESTINATOIN_SSH_URL "docker rm backend-develop"
    - ssh $DESTINATOIN_SSH_URL "docker run --name backend-develop -d $CI_REGISTRY_IMAGE${tag}"
  rules:
    - if: $CI_COMMIT_BRANCH == "develop"


deploy-prod:
  stage: deploy
  image: ubuntu
  variables:
    DESTINATOIN_SSH_URL: ssh://ubuntu@$DESTINATION_HOST
  before_script:
    # Prepare ssh to destination host
    - 'which ssh-agent || ( apt-get update -y && apt-get install openssh-client -y )'
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add - > /dev/null
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan -t rsa $DESTINATION_HOST >> ~/.ssh/known_hosts
  script:
    - |
      if [[ "$CI_COMMIT_BRANCH" == "$CI_DEFAULT_BRANCH" ]]; then
        tag=""
        echo "Running on default branch '$CI_DEFAULT_BRANCH': tag = 'latest'"
      else
        tag=":$CI_COMMIT_REF_SLUG"
        echo "Running on branch '$CI_COMMIT_BRANCH': tag = $tag"
      fi
    # login to the gitlab container repository
    - ssh $DESTINATOIN_SSH_URL "docker login -u gitlab-ci-token -p $CI_JOB_TOKEN $CI_REGISTRY"
    - ssh $DESTINATOIN_SSH_URL "docker pull $CI_REGISTRY_IMAGE${tag}"
    - ssh $DESTINATOIN_SSH_URL "docker stop backend-master"
    - ssh $DESTINATOIN_SSH_URL "docker rm backend-master"
    - ssh $DESTINATOIN_SSH_URL "docker run --name backend-master -d $CI_REGISTRY_IMAGE${tag}"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH